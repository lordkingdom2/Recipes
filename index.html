<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gourmet Grid | The Recipe App</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f8f8f8;
            --text: #000000;
            --accent: #d33c2a;
            --grid: rgba(0,0,0,0.04);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; font-family: 'Inter Tight', sans-serif; -webkit-font-smoothing: antialiased; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

        /* CANVAS & PHYSICS */
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; background-image: radial-gradient(var(--grid) 2px, transparent 2px); background-size: 50px 50px; touch-action: none; }
        #viewport:active { cursor: grabbing; }
        #canvas { position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; transform-origin: 0 0; will-change: transform; }

        /* UI ELEMENTS */
        header { position: fixed; top: 40px; left: 40px; z-index: 100; pointer-events: none; }
        header h1 { font-weight: 800; font-size: clamp(24px, 4vw, 42px); margin: 0; letter-spacing: -2px; line-height: 0.9; }

        .fab-add { position: fixed; top: 40px; right: 40px; width: 60px; height: 60px; border-radius: 50%; background: #000; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: 300; cursor: pointer; z-index: 100; transition: 0.3s var(--ease); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .fab-add:hover { background: var(--accent); transform: scale(1.1) rotate(90deg); }

        /* RECIPE CARDS */
        .recipe-card { position: absolute; width: 320px; background: #fff; transition: transform 0.6s var(--ease); box-shadow: 0 20px 50px rgba(0,0,0,0.06); cursor: pointer; }
        .recipe-card:hover { transform: translateY(-15px) scale(1.02); z-index: 10; }
        .recipe-card img { width: 100%; aspect-ratio: 1; object-fit: cover; }
        .card-info { padding: 25px; }
        .card-title { font-size: 22px; font-weight: 800; margin: 0 0 10px 0; letter-spacing: -1px; }
        .card-ingredients { font-size: 13px; color: #666; margin-bottom: 15px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-meta { display: flex; justify-content: space-between; border-top: 1px solid #eee; padding-top: 15px; font-size: 12px; }
        .card-meta b { display: block; font-size: 14px; }

        /* OVERLAYS (Detail & Editor) */
        .overlay { position: fixed; inset: 0; background: #fff; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.5s var(--ease); overflow-y: auto; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .close-btn { position: fixed; top: 40px; right: 40px; background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; z-index: 1100; transition: 0.3s; }
        .close-btn:hover { background: var(--accent); transform: scale(1.05); }
        .overlay-content { max-width: 900px; margin: 0 auto; padding: 120px 40px; }

        /* EDITOR FORM */
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; background: #fdfdfd; transition: border 0.3s; }
        input:focus, textarea:focus { outline: none; border-color: #000; }
        
        .ing-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .ing-row input[type="number"] { flex: 1; }
        .ing-row input.unit { flex: 1; }
        .ing-row input.name { flex: 3; }
        
        .btn-black { background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-black:hover { background: var(--accent); }
        .btn-outline { background: transparent; color: #000; border: 2px solid #000; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        /* INGREDIENT LIST (DETAIL) */
        .ing-list-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #eee; font-size: 18px; }
        .ing-list-item:last-child { border-bottom: none; }
        .ing-amount { font-weight: 800; width: 120px; }

    </style>
</head>
<body>

<header><h1>THE<br>GOURMET<br>GRID</h1></header>

<button class="fab-add" onclick="openEditor()">+</button>

<div id="viewport"><div id="canvas"></div></div>

<div id="detail-overlay" class="overlay">
    <button class="close-btn" onclick="closeOverlay('detail-overlay')">ZURÜCK</button>
    <div class="overlay-content" id="detail-content"></div>
</div>

<div id="editor-overlay" class="overlay">
    <button class="close-btn" onclick="closeOverlay('editor-overlay')">ABBRECHEN</button>
    <div class="overlay-content">
        <h1 style="font-size: 48px; margin-bottom: 40px; letter-spacing: -2px;">Neues Rezept</h1>
        
        <div class="form-group"><label>Rezept Name</label><input type="text" id="ed-name" placeholder="z.B. Trüffel-Pasta"></div>
        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;"><label>Kategorie</label><input type="text" id="ed-cat" placeholder="z.B. Pasta"></div>
            <div class="form-group" style="flex: 1;"><label>Bild URL</label><input type="text" id="ed-img" placeholder="https://..."></div>
        </div>
        <div style="display: flex; gap: 20px;">
            <div class="form-group" style="flex: 1;"><label>Dauer (Min)</label><input type="number" id="ed-time" value="30"></div>
            <div class="form-group" style="flex: 1;"><label>Kalorien (pro Port.)</label><input type="number" id="ed-cal" value="600"></div>
            <div class="form-group" style="flex: 1;"><label>Protein (g)</label><input type="number" id="ed-prot" value="25"></div>
            <div class="form-group" style="flex: 1;"><label>Basis-Portionen</label><input type="number" id="ed-base-servings" value="2"></div>
        </div>

        <div class="form-group">
            <label>Zutaten (Menge | Einheit | Zutat)</label>
            <div id="ed-ingredients-container">
                </div>
            <button class="btn-outline" style="margin-top: 10px;" onclick="addIngredientRow()">+ Zutat hinzufügen</button>
        </div>

        <div class="form-group">
            <label>Zubereitung</label>
            <textarea id="ed-instructions" rows="8" placeholder="1. Wasser kochen..."></textarea>
        </div>

        <button class="btn-black" onclick="saveRecipe()">REZEPT SPEICHERN</button>
    </div>
</div>

<script type="module">
    // Firebase CDN Imports für Browser
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // DEINE FIREBASE CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyD9K2SaIsFjH3rgdn3OlAJCXSTmp54Z7EU",
        authDomain: "recipes-eb373.firebaseapp.com",
        projectId: "recipes-eb373",
        storageBucket: "recipes-eb373.firebasestorage.app",
        messagingSenderId: "598463014390",
        appId: "1:598463014390:web:2af8dfd831471f6fcb13d7",
        measurementId: "G-3FF8RV88JC"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Globale Variablen an window hängen, damit HTML-Buttons sie aufrufen können
    window.recipes = [];
    let camX = window.innerWidth/2, camY = window.innerHeight/2;
    let targetCamX = window.innerWidth/2, targetCamY = window.innerHeight/2;
    let currentScale = 0.5;

    // 1. REZEPTE LADEN
    window.loadRecipes = async function() {
        const querySnapshot = await getDocs(collection(db, "recipes"));
        window.recipes = [];
        querySnapshot.forEach((doc) => {
            window.recipes.push({ id: doc.id, ...doc.data() });
        });
        renderCanvas();
    }

    // 2. CANVAS RENDERN
    function renderCanvas() {
        const container = document.getElementById('canvas');
        container.innerHTML = '';

        window.recipes.forEach(r => {
            // Extrahiere nur die Namen der Zutaten für die Vorschau-Karte
            const zutatenNamen = (r.zutaten || []).map(z => z.name).join(', ');

            const card = document.createElement('div');
            card.className = 'recipe-card';
            // Setze Rezept an gespeicherte Position oder ins Zentrum
            card.style.left = `${r.xPos || 500}px`;
            card.style.top = `${r.yPos || 500}px`;
            
            card.innerHTML = `
                <img src="${r.bildUrl || 'https://images.unsplash.com/photo-1495195134817-a1a2807facx1?auto=format&fit=crop&q=80&w=800'}" loading="lazy">
                <div class="card-info">
                    <div style="color: var(--accent); font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px;">${r.kategorie || 'Allgemein'}</div>
                    <h2 class="card-title">${r.name}</h2>
                    <div class="card-ingredients">${zutatenNamen}</div>
                    <div class="card-meta">
                        <div>Dauer<b>${r.dauer}m</b></div>
                        <div>Protein<b>${r.protein}g</b></div>
                        <div>Energie<b>${r.kalorien} kcal</b></div>
                    </div>
                </div>
            `;
            card.onclick = () => window.openDetail(r);
            container.appendChild(card);
        });
    }

    // 3. DETAIL ANSICHT & PORTIONS-RECHNER
    window.openDetail = function(r) {
        const overlay = document.getElementById('detail-overlay');
        const content = document.getElementById('detail-content');
        
        let initialServings = r.basisPortionen || 2;

        function renderDetailHtml(currentServings) {
            // Zutaten dynamisch berechnen
            let zutatenHtml = '';
            (r.zutaten || []).forEach(z => {
                const calculatedAmount = (z.menge / initialServings) * currentServings;
                // Formatiere Zahlen (z.B. 1.5 statt 1.500)
                const displayAmount = calculatedAmount % 1 === 0 ? calculatedAmount : calculatedAmount.toFixed(1);
                zutatenHtml += `
                    <div class="ing-list-item">
                        <span class="ing-amount">${displayAmount} ${z.einheit}</span>
                        <span class="ing-name">${z.name}</span>
                    </div>`;
            });

            // Nährwerte berechnen
            const calcProt = ((r.protein / initialServings) * currentServings).toFixed(0);
            const calcCal = ((r.kalorien / initialServings) * currentServings).toFixed(0);

            return `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start;">
                    <div>
                        <div style="color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">${r.kategorie}</div>
                        <h1 style="font-size: 64px; margin: 10px 0 30px 0; letter-spacing: -2px; line-height: 0.9;">${r.name}</h1>
                        
                        <div style="background: #f9f9f9; padding: 25px; border-radius: 20px; margin-bottom: 40px; display: flex; align-items: center; justify-content: space-between;">
                            <div>
                                <label style="font-size: 11px; font-weight: 800; color: #888; text-transform: uppercase;">Portionen</label><br>
                                <input type="number" id="detail-servings" value="${currentServings}" min="1" style="font-size: 24px; padding: 5px; width: 70px; background: transparent; border: none; border-bottom: 2px solid #000; border-radius: 0;">
                            </div>
                            <div style="text-align: right; font-weight: 600; font-size: 14px;">
                                Total Protein: <b style="font-size: 18px;">${calcProt}g</b><br>
                                Total Energie: <b style="font-size: 18px;">${calcCal} kcal</b>
                            </div>
                        </div>

                        <h3 style="font-size: 24px; margin-bottom: 20px;">Zutaten</h3>
                        <div style="margin-bottom: 50px;">${zutatenHtml}</div>

                        <h3 style="font-size: 24px; margin-bottom: 20px;">Zubereitung</h3>
                        <div style="font-size: 18px; line-height: 1.6; color: #444; white-space: pre-wrap;">${r.anleitung}</div>
                    </div>
                    <div>
                        <img src="${r.bildUrl}" style="width: 100%; aspect-ratio: 4/5; object-fit: cover; border-radius: 20px;">
                    </div>
                </div>
            `;
        }

        content.innerHTML = renderDetailHtml(initialServings);
        overlay.classList.add('active');

        // Event Listener für dynamisches Neu-Berechnen
        content.querySelector('#detail-servings').addEventListener('input', (e) => {
            const newServings = parseFloat(e.target.value) || 1;
            // Wir überschreiben das HTML, setzen aber den Fokus danach zurück
            content.innerHTML = renderDetailHtml(newServings);
            const newInput = content.querySelector('#detail-servings');
            newInput.focus();
            
            // Rekursiver Listener für das neu gerenderte Input
            newInput.addEventListener('input', arguments.callee);
        });
    }

    // 4. EDITOR LOGIK
    window.openEditor = function() {
        document.getElementById('ed-ingredients-container').innerHTML = '';
        addIngredientRow(); // Startet mit einer leeren Zutat
        document.getElementById('editor-overlay').classList.add('active');
    }

    window.closeOverlay = function(id) {
        document.getElementById(id).classList.remove('active');
    }

    window.addIngredientRow = function() {
        const container = document.getElementById('ed-ingredients-container');
        const row = document.createElement('div');
        row.className = 'ing-row';
        row.innerHTML = `
            <input type="number" class="ing-amount" placeholder="Menge" step="0.1">
            <input type="text" class="unit" placeholder="Einheit (g, ml, EL)">
            <input type="text" class="name" placeholder="Zutat (z.B. Kartoffeln)">
        `;
        container.appendChild(row);
    }

    window.saveRecipe = async function() {
        const btn = document.querySelector('#editor-overlay .btn-black');
        btn.innerText = "Speichere...";
        
        // Zutaten sammeln
        let zutaten = [];
        document.querySelectorAll('.ing-row').forEach(row => {
            const menge = parseFloat(row.querySelector('.ing-amount').value);
            const einheit = row.querySelector('.unit').value.trim();
            const name = row.querySelector('.name').value.trim();
            if(name !== "" && !isNaN(menge)) {
                zutaten.push({ menge, einheit, name });
            }
        });

        // Wo soll die Karte spawnen? Genau dort, wo die Kamera gerade hinschaut!
        const spawnX = (window.innerWidth / 2) / currentScale + camX;
        const spawnY = (window.innerHeight / 2) / currentScale + camY;

        const newRecipe = {
            name: document.getElementById('ed-name').value || "Unbenanntes Rezept",
            kategorie: document.getElementById('ed-cat').value || "Allgemein",
            bildUrl: document.getElementById('ed-img').value || "https://images.unsplash.com/photo-1495195134817-a1a2807facx1?auto=format&fit=crop&q=80&w=800",
            dauer: parseInt(document.getElementById('ed-time').value) || 0,
            kalorien: parseInt(document.getElementById('ed-cal').value) || 0,
            protein: parseInt(document.getElementById('ed-prot').value) || 0,
            basisPortionen: parseInt(document.getElementById('ed-base-servings').value) || 2,
            anleitung: document.getElementById('ed-instructions').value || "",
            zutaten: zutaten,
            xPos: spawnX - 150, // -150 um es mittig zu zentrieren (Karte ist 300 breit)
            yPos: spawnY - 150
        };

        try {
            await addDoc(collection(db, "recipes"), newRecipe);
            window.closeOverlay('editor-overlay');
            
            // Felder leeren
            document.querySelectorAll('#editor-overlay input, #editor-overlay textarea').forEach(el => el.value = '');
            
            // Rezepte neu laden (wird sofort auf Canvas sichtbar)
            window.loadRecipes();
        } catch(e) {
            alert("Fehler beim Speichern: " + e.message);
        } finally {
            btn.innerText = "REZEPT SPEICHERN";
        }
    }

    // 5. PHYSICS & PANNING ENGINE
    let isDragging = false, startX, startY, scrollX, scrollY;
    const vp = document.getElementById('viewport');
    
    vp.onpointerdown = (e) => {
        isDragging = true;
        startX = e.pageX; startY = e.pageY;
        scrollX = targetCamX; scrollY = targetCamY;
    };

    window.onpointermove = (e) => {
        if (!isDragging) return;
        targetCamX = scrollX - (e.pageX - startX) / currentScale;
        targetCamY = scrollY - (e.pageY - startY) / currentScale;
    };

    window.onpointerup = () => isDragging = false;
    
    // Smooth Zoom
    window.onwheel = (e) => {
        if(document.getElementById('detail-overlay').classList.contains('active') || 
           document.getElementById('editor-overlay').classList.contains('active')) return;
        currentScale = Math.min(Math.max(0.3, currentScale - e.deltaY * 0.001), 2);
    };

    function animate() {
        camX += (targetCamX - camX) * 0.1;
        camY += (targetCamY - camY) * 0.1;
        
        const offsetX = (window.innerWidth / 2) - (camX * currentScale);
        const offsetY = (window.innerHeight / 2) - (camY * currentScale);

        document.getElementById('canvas').style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0) scale(${currentScale})`;
        requestAnimationFrame(animate);
    }

    // Init App
    window.loadRecipes();
    animate();

</script>
</body>
</html>
