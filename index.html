<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gourmet Grid | The Ultimate Archive</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f5f5f7;
            --text: #1d1d1f;
            --accent: #d33c2a;
            --grid: rgba(0,0,0,0.03);
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
            --card-radius: 24px;
        }

        * { box-sizing: border-box; font-family: 'Inter Tight', sans-serif; -webkit-font-smoothing: antialiased; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); }

        /* CANVAS & PHYSICS */
        #viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; cursor: grab; background-image: radial-gradient(var(--grid) 2px, transparent 2px); background-size: 60px 60px; touch-action: none; }
        #viewport:active { cursor: grabbing; }
        #canvas { position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; transform-origin: 0 0; will-change: transform; }

        /* UI ELEMENTS */
        header { position: fixed; top: 40px; left: 40px; z-index: 100; pointer-events: none; }
        header h1 { font-weight: 800; font-size: clamp(28px, 4vw, 48px); margin: 0; letter-spacing: -2px; line-height: 0.9; }

        .controls { position: fixed; top: 40px; right: 40px; display: flex; gap: 15px; z-index: 100; }
        .fab { width: 60px; height: 60px; border-radius: 50%; background: #fff; color: #000; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.4s var(--ease); box-shadow: 0 15px 35px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.05); }
        .fab.dark { background: #000; color: #fff; font-size: 32px; font-weight: 300; }
        .fab:hover { transform: translateY(-5px) scale(1.05); }
        .fab.dark:hover { background: var(--accent); transform: translateY(-5px) scale(1.05) rotate(90deg); }

        /* FILTER SIDEBAR */
        #filter-sidebar { position: fixed; top: 0; left: -400px; width: 350px; height: 100vh; background: rgba(255,255,255,0.85); backdrop-filter: blur(25px); border-right: 1px solid rgba(0,0,0,0.05); z-index: 900; padding: 140px 40px 40px; transition: 0.6s var(--ease); box-shadow: 20px 0 50px rgba(0,0,0,0.05); overflow-y: auto; }
        #filter-sidebar.open { left: 0; }
        .filter-group { margin-bottom: 25px; }
        .filter-group label { display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; text-transform: uppercase; color: #888; margin-bottom: 8px; }
        .filter-group input[type="range"] { width: 100%; accent-color: var(--accent); }
        .filter-group input[type="text"], .filter-group select { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid #ddd; background: transparent; font-size: 14px; font-weight: 600; }
        .val-badge { color: var(--accent); }

        /* RECIPE CARDS */
        .recipe-card { position: absolute; width: 340px; background: #fff; border-radius: var(--card-radius); transition: transform 0.6s var(--ease), opacity 0.4s; box-shadow: 0 20px 50px rgba(0,0,0,0.05); cursor: pointer; overflow: hidden; }
        .recipe-card.hidden { opacity: 0; pointer-events: none; transform: scale(0.9); }
        .recipe-card:hover { transform: translateY(-15px) scale(1.02); z-index: 10; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .recipe-card img { width: 100%; height: 260px; object-fit: cover; }
        .card-info { padding: 25px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .card-cat { color: var(--accent); font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .card-rating { font-size: 14px; color: #ffcc00; }
        .card-title { font-size: 24px; font-weight: 800; margin: 0 0 15px 0; letter-spacing: -1px; line-height: 1.1; }
        .card-meta { display: flex; justify-content: space-between; border-top: 1px solid #f0f0f0; padding-top: 15px; font-size: 12px; color: #888; }
        .card-meta b { display: block; font-size: 15px; color: #000; margin-top: 2px; }

        /* OVERLAYS */
        .overlay { position: fixed; inset: 0; background: #fff; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.5s var(--ease); overflow-y: auto; }
        .overlay.active { opacity: 1; pointer-events: auto; }
        .close-btn { position: fixed; top: 40px; right: 40px; background: #000; color: #fff; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: 700; z-index: 1100; transition: 0.3s; }
        .close-btn:hover { background: var(--accent); transform: scale(1.05); }
        .overlay-content { max-width: 1000px; margin: 0 auto; padding: 120px 40px; }

        /* DETAIL VIEW */
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
        .action-row { display: flex; gap: 10px; margin-top: 30px; }
        .btn-edit, .btn-delete { padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; transition: 0.3s; }
        .btn-edit { background: #eee; color: #000; } .btn-edit:hover { background: #ddd; }
        .btn-delete { background: #ffebee; color: #c62828; } .btn-delete:hover { background: #ffcdd2; }
        .servings-box { background: #f9f9f9; padding: 25px; border-radius: var(--card-radius); margin: 30px 0; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .servings-input { font-size: 32px; font-weight: 800; width: 60px; border: none; background: transparent; border-bottom: 2px solid #000; border-radius: 0; text-align: center; }

        /* EDITOR FORM */
        .ed-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: #888; }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; background: #fafafa; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #000; background: #fff; }
        .image-upload-wrapper { position: relative; width: 100%; height: 200px; border: 2px dashed #ddd; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; background: #fafafa; }
        .image-upload-wrapper img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.3s; }
        .image-upload-wrapper span { font-weight: 700; color: #888; }
        
        .ing-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .ing-row input.amount { flex: 1; } .ing-row input.unit { flex: 1; } .ing-row input.name { flex: 3; }
        
        .btn-primary { background: #000; color: #fff; border: none; padding: 18px 30px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px; }
        .btn-primary:hover { background: var(--accent); }
    </style>
</head>
<body>

<header><h1>RECIPE<br>ARCHIVE</h1></header>

<div class="controls">
    <button class="fab" onclick="toggleFilter()" title="Filter">⚲</button>
    <button class="fab dark" onclick="openEditor()" title="Neues Rezept">+</button>
</div>

<div id="filter-sidebar">
    <h2 style="font-weight: 800; margin-top: 0;">Filter</h2>
    <div class="filter-group">
        <label>Suche</label>
        <input type="text" id="f-search" placeholder="Name oder Zutat..." oninput="applyFilters()">
    </div>
    <div class="filter-group">
        <label>Schwierigkeit</label>
        <select id="f-diff" onchange="applyFilters()">
            <option value="all">Alle</option><option value="1">Leicht</option><option value="2">Mittel</option><option value="3">Schwer</option>
        </select>
    </div>
    <div class="filter-group">
        <label>Max Dauer <span class="val-badge" id="val-time">120m</span></label>
        <input type="range" id="f-time" min="10" max="240" step="10" value="240" oninput="document.getElementById('val-time').innerText = this.value+'m'; applyFilters()">
    </div>
    <div class="filter-group">
        <label>Min Protein <span class="val-badge" id="val-prot">0g</span></label>
        <input type="range" id="f-prot" min="0" max="100" step="5" value="0" oninput="document.getElementById('val-prot').innerText = this.value+'g'; applyFilters()">
    </div>
    <div class="filter-group">
        <label>Min Rating <span class="val-badge" id="val-rating">1★</span></label>
        <input type="range" id="f-rating" min="1" max="5" step="1" value="1" oninput="document.getElementById('val-rating').innerText = this.value+'★'; applyFilters()">
    </div>
</div>

<div id="viewport"><div id="canvas"></div></div>

<div id="detail-overlay" class="overlay">
    <button class="close-btn" onclick="closeOverlay('detail-overlay')">SCHLIESSEN</button>
    <div class="overlay-content" id="detail-content"></div>
</div>

<div id="editor-overlay" class="overlay">
    <button class="close-btn" onclick="closeOverlay('editor-overlay')">ABBRECHEN</button>
    <div class="overlay-content">
        <h1 style="font-size: 48px; margin-bottom: 40px; letter-spacing: -2px;" id="ed-title">Neues Rezept</h1>
        <input type="hidden" id="ed-id"> <div class="ed-grid">
            <div class="form-group">
                <label>Bild hochladen</label>
                <div class="image-upload-wrapper" onclick="document.getElementById('ed-file').click()">
                    <span>Klicken zum Auswählen</span>
                    <img id="ed-img-preview">
                </div>
                <input type="file" id="ed-file" accept="image/*" style="display: none;" onchange="handleImageUpload(event)">
                <input type="hidden" id="ed-img-base64"> </div>
            <div>
                <div class="form-group"><label>Rezept Name</label><input type="text" id="ed-name"></div>
                <div class="form-group"><label>Kategorie</label><input type="text" id="ed-cat"></div>
            </div>
        </div>

        <div class="ed-grid">
            <div class="form-group"><label>Dauer (Min)</label><input type="number" id="ed-time"></div>
            <div class="form-group"><label>Schwierigkeit (1-3)</label><input type="number" id="ed-diff" min="1" max="3" value="1"></div>
            <div class="form-group"><label>Sterne (1-5)</label><input type="number" id="ed-rating" min="1" max="5" value="5"></div>
            <div class="form-group"><label>Basis-Portionen</label><input type="number" id="ed-servings" value="2"></div>
        </div>
        
        <div class="ed-grid">
            <div class="form-group"><label>Kalorien (pro Port.)</label><input type="number" id="ed-cal"></div>
            <div class="form-group"><label>Protein (g)</label><input type="number" id="ed-prot"></div>
        </div>

        <div class="form-group">
            <label>Zutaten (Menge | Einheit | Name)</label>
            <div id="ed-ingredients"></div>
            <button class="btn-edit" style="width:100%; margin-top:10px;" onclick="addIngredientRow()">+ Zutat hinzufügen</button>
        </div>

        <div class="form-group">
            <label>Zubereitung</label>
            <textarea id="ed-instructions" rows="8"></textarea>
        </div>

        <button class="btn-primary" onclick="saveRecipe()" id="ed-save-btn">REZEPT SPEICHERN</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD9K2SaIsFjH3rgdn3OlAJCXSTmp54Z7EU",
        authDomain: "recipes-eb373.firebaseapp.com",
        projectId: "recipes-eb373",
        storageBucket: "recipes-eb373.firebasestorage.app",
        messagingSenderId: "598463014390",
        appId: "1:598463014390:web:2af8dfd831471f6fcb13d7"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.recipes = [];
    let camX = window.innerWidth/2, camY = window.innerHeight/2;
    let targetCamX = window.innerWidth/2, targetCamY = window.innerHeight/2;
    let currentScale = 0.5;

    // --- DATEN LADEN & RENDERN ---
    window.loadRecipes = async function() {
        const querySnapshot = await getDocs(collection(db, "recipes"));
        window.recipes = [];
        querySnapshot.forEach((doc) => window.recipes.push({ id: doc.id, ...doc.data() }));
        renderCanvas();
        applyFilters(); // Filter sofort anwenden
    }

    function renderCanvas() {
        const container = document.getElementById('canvas');
        container.innerHTML = '';

        window.recipes.forEach(r => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.id = `card-${r.id}`;
            card.style.left = `${r.xPos || 500}px`;
            card.style.top = `${r.yPos || 500}px`;
            
            const stars = "★".repeat(r.rating || 5) + "☆".repeat(5 - (r.rating || 5));
            const imgSrc = r.bildBase64 || 'https://images.unsplash.com/photo-1495195134817-a1a2807facx1?auto=format&fit=crop&q=80&w=800';

            card.innerHTML = `
                <img src="${imgSrc}" loading="lazy">
                <div class="card-info">
                    <div class="card-header">
                        <span class="card-cat">${r.kategorie || 'Neu'}</span>
                        <span class="card-rating">${stars}</span>
                    </div>
                    <h2 class="card-title">${r.name}</h2>
                    <div class="card-meta">
                        <div>Dauer<b>${r.dauer || 0}m</b></div>
                        <div>Protein<b>${r.protein || 0}g</b></div>
                        <div>Level<b>${r.schwierigkeit || 1}/3</b></div>
                    </div>
                </div>
            `;
            // Drag-Check, damit Klicks nicht beim Pannen ausgelöst werden
            card.onpointerdown = () => card.setAttribute('data-drag', 'false');
            card.onpointermove = () => card.setAttribute('data-drag', 'true');
            card.onclick = (e) => { if (card.getAttribute('data-drag') === 'false') window.openDetail(r); };
            
            container.appendChild(card);
        });
    }

    // --- FILTER LOGIK ---
    window.toggleFilter = () => document.getElementById('filter-sidebar').classList.toggle('open');
    
    window.applyFilters = function() {
        const search = document.getElementById('f-search').value.toLowerCase();
        const diff = document.getElementById('f-diff').value;
        const maxTime = parseInt(document.getElementById('f-time').value);
        const minProt = parseInt(document.getElementById('f-prot').value);
        const minRating = parseInt(document.getElementById('f-rating').value);

        window.recipes.forEach(r => {
            const el = document.getElementById(`card-${r.id}`);
            if(!el) return;

            const ingString = (r.zutaten || []).map(z => z.name).join(' ').toLowerCase();
            const matchSearch = r.name.toLowerCase().includes(search) || ingString.includes(search);
            const matchDiff = diff === 'all' || parseInt(r.schwierigkeit) === parseInt(diff);
            const matchTime = parseInt(r.dauer || 0) <= maxTime;
            const matchProt = parseInt(r.protein || 0) >= minProt;
            const matchRating = parseInt(r.rating || 0) >= minRating;

            if (matchSearch && matchDiff && matchTime && matchProt && matchRating) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        });
    }

    // --- DETAIL & RECHNER ---
    window.openDetail = function(r) {
        const overlay = document.getElementById('detail-overlay');
        const content = document.getElementById('detail-content');
        let currentServings = r.basisPortionen || 2;

        window.renderDetailView = function(servings) {
            let zutatenHtml = '';
            (r.zutaten || []).forEach(z => {
                const amount = ((z.menge / (r.basisPortionen || 2)) * servings);
                const display = amount % 1 === 0 ? amount : amount.toFixed(1);
                zutatenHtml += `<div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee; font-size:18px;"><b style="width:120px;">${display} ${z.einheit}</b><span>${z.name}</span></div>`;
            });

            const p = ((r.protein / (r.basisPortionen||2)) * servings).toFixed(0);
            const c = ((r.kalorien / (r.basisPortionen||2)) * servings).toFixed(0);
            const imgSrc = r.bildBase64 || 'https://images.unsplash.com/photo-1495195134817-a1a2807facx1?auto=format&fit=crop&q=80&w=800';

            content.innerHTML = `
                <div class="detail-grid">
                    <div>
                        <div style="color:var(--accent); font-weight:800; text-transform:uppercase; margin-bottom:10px;">${r.kategorie}</div>
                        <h1 style="font-size:64px; margin:0 0 20px; line-height:0.9; letter-spacing:-2px;">${r.name}</h1>
                        
                        <div class="servings-box">
                            <div>
                                <div style="font-size:11px; font-weight:800; color:#888; text-transform:uppercase;">Portionen</div>
                                <input type="number" class="servings-input" value="${servings}" min="1" oninput="window.renderDetailView(this.value); this.focus();">
                            </div>
                            <div style="text-align:right;">
                                <div>Protein: <b>${p}g</b></div>
                                <div>Energie: <b>${c} kcal</b></div>
                            </div>
                        </div>

                        <h3 style="font-size:24px;">Zutaten</h3>
                        <div style="margin-bottom:40px;">${zutatenHtml}</div>
                        
                        <h3 style="font-size:24px;">Zubereitung</h3>
                        <div style="font-size:18px; line-height:1.6; white-space:pre-wrap;">${r.anleitung}</div>

                        <div class="action-row">
                            <button class="btn-edit" onclick="editRecipe('${r.id}')">Bearbeiten</button>
                            <button class="btn-delete" onclick="deleteRecipe('${r.id}')">Löschen</button>
                        </div>
                    </div>
                    <img src="${imgSrc}" style="width:100%; border-radius:var(--card-radius);">
                </div>
            `;
        };
        renderDetailView(currentServings);
        overlay.classList.add('active');
    }

    // --- CRUD: EDITOR, BILDER, LÖSCHEN ---
    window.openEditor = function() {
        document.getElementById('ed-title').innerText = "Neues Rezept";
        document.getElementById('ed-id').value = "";
        document.querySelectorAll('#editor-overlay input, #editor-overlay textarea').forEach(el => el.value = '');
        document.getElementById('ed-ingredients').innerHTML = '';
        document.getElementById('ed-img-preview').style.opacity = '0';
        document.getElementById('ed-img-base64').value = '';
        window.addIngredientRow();
        document.getElementById('editor-overlay').classList.add('active');
    }

    window.editRecipe = function(id) {
        const r = window.recipes.find(rec => rec.id === id);
        if(!r) return;
        
        closeOverlay('detail-overlay');
        document.getElementById('ed-title').innerText = "Rezept bearbeiten";
        document.getElementById('ed-id').value = r.id;
        document.getElementById('ed-name').value = r.name || '';
        document.getElementById('ed-cat').value = r.kategorie || '';
        document.getElementById('ed-time').value = r.dauer || '';
        document.getElementById('ed-diff').value = r.schwierigkeit || 1;
        document.getElementById('ed-rating').value = r.rating || 5;
        document.getElementById('ed-servings').value = r.basisPortionen || 2;
        document.getElementById('ed-cal').value = r.kalorien || '';
        document.getElementById('ed-prot').value = r.protein || '';
        document.getElementById('ed-instructions').value = r.anleitung || '';
        
        if(r.bildBase64) {
            document.getElementById('ed-img-preview').src = r.bildBase64;
            document.getElementById('ed-img-preview').style.opacity = '1';
            document.getElementById('ed-img-base64').value = r.bildBase64;
        }

        const ingContainer = document.getElementById('ed-ingredients');
        ingContainer.innerHTML = '';
        (r.zutaten || []).forEach(z => window.addIngredientRow(z.menge, z.einheit, z.name));
        if(!r.zutaten || r.zutaten.length === 0) window.addIngredientRow();

        document.getElementById('editor-overlay').classList.add('active');
    }

    window.deleteRecipe = async function(id) {
        if(confirm("Rezept wirklich löschen?")) {
            await deleteDoc(doc(db, "recipes", id));
            closeOverlay('detail-overlay');
            window.loadRecipes();
        }
    }

    window.addIngredientRow = function(m = '', e = '', n = '') {
        const container = document.getElementById('ed-ingredients');
        const div = document.createElement('div');
        div.className = 'ing-row';
        div.innerHTML = `<input type="number" class="amount" placeholder="Menge" value="${m}"><input type="text" class="unit" placeholder="Einheit" value="${e}"><input type="text" class="name" placeholder="Name" value="${n}">`;
        container.appendChild(div);
    }

    // BILD KOMPRIMIERUNG (Browser-Side Magic)
    window.handleImageUpload = function(event) {
        const file = event.target.files[0];
        if(!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;
                
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                // Als WebP komprimieren (spart enorm Speicher in Firestore)
                const base64 = canvas.toDataURL('image/webp', 0.7);
                document.getElementById('ed-img-preview').src = base64;
                document.getElementById('ed-img-preview').style.opacity = '1';
                document.getElementById('ed-img-base64').value = base64;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    window.saveRecipe = async function() {
        const btn = document.getElementById('ed-save-btn');
        btn.innerText = "Wird gespeichert...";
        
        const id = document.getElementById('ed-id').value;
        let zutaten = [];
        document.querySelectorAll('.ing-row').forEach(row => {
            const menge = parseFloat(row.querySelector('.amount').value);
            const einheit = row.querySelector('.unit').value.trim();
            const name = row.querySelector('.name').value.trim();
            if(name) zutaten.push({ menge: isNaN(menge)?0:menge, einheit, name });
        });

        const spawnX = (window.innerWidth / 2) / currentScale + camX - 170;
        const spawnY = (window.innerHeight / 2) / currentScale + camY - 200;

        const data = {
            name: document.getElementById('ed-name').value || "Neues Rezept",
            kategorie: document.getElementById('ed-cat').value,
            bildBase64: document.getElementById('ed-img-base64').value,
            dauer: parseInt(document.getElementById('ed-time').value) || 0,
            schwierigkeit: parseInt(document.getElementById('ed-diff').value) || 1,
            rating: parseInt(document.getElementById('ed-rating').value) || 5,
            kalorien: parseInt(document.getElementById('ed-cal').value) || 0,
            protein: parseInt(document.getElementById('ed-prot').value) || 0,
            basisPortionen: parseInt(document.getElementById('ed-servings').value) || 2,
            anleitung: document.getElementById('ed-instructions').value,
            zutaten: zutaten
        };

        try {
            if(id) {
                await updateDoc(doc(db, "recipes", id), data);
            } else {
                data.xPos = spawnX;
                data.yPos = spawnY;
                await addDoc(collection(db, "recipes"), data);
            }
            closeOverlay('editor-overlay');
            window.loadRecipes();
        } catch(e) {
            alert("Fehler: " + e.message);
        } finally {
            btn.innerText = "REZEPT SPEICHERN";
        }
    }

    window.closeOverlay = (id) => document.getElementById(id).classList.remove('active');

    // --- PHYSICS ENGINE ---
    let isDragging = false, startX, startY, scrollX, scrollY;
    const vp = document.getElementById('viewport');
    
    vp.onpointerdown = (e) => {
        if(e.target.closest('.recipe-card')) return; // Kein Pannen beim Klicken auf Karte
        isDragging = true; startX = e.pageX; startY = e.pageY; scrollX = targetCamX; scrollY = targetCamY;
    };
    window.onpointermove = (e) => {
        if (!isDragging) return;
        targetCamX = scrollX - (e.pageX - startX) / currentScale; targetCamY = scrollY - (e.pageY - startY) / currentScale;
    };
    window.onpointerup = () => isDragging = false;
    
    window.onwheel = (e) => {
        if(document.querySelector('.overlay.active') || document.getElementById('filter-sidebar').classList.contains('open')) return;
        currentScale = Math.min(Math.max(0.2, currentScale - e.deltaY * 0.001), 2);
    };

    function animate() {
        camX += (targetCamX - camX) * 0.1; camY += (targetCamY - camY) * 0.1;
        const offsetX = (window.innerWidth / 2) - (camX * currentScale);
        const offsetY = (window.innerHeight / 2) - (camY * currentScale);
        document.getElementById('canvas').style.transform = `translate3d(${offsetX}px, ${offsetY}px, 0) scale(${currentScale})`;
        requestAnimationFrame(animate);
    }

    window.loadRecipes();
    animate();
</script>
</body>
</html>
